<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelayanan Statistik Terpadu</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- QR CODE LIB (OFFLINE STYLE) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    .bg-pattern {
      background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    .fade-in {
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
    }
    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-blue-50 to-white min-h-screen flex items-center justify-center bg-pattern">

  <div class="max-w-5xl w-full bg-white/90 backdrop-blur shadow-2xl rounded-3xl p-10 text-center fade-in">

    <!-- <img src="logo.png" class="mx-auto mb-4 w-24 fade-in" style="animation-delay:0.2s"> -->

    <h1 class="text-4xl font-extrabold text-blue-800 mb-2 fade-in" style="animation-delay:0.3s">
      Pelayanan Statistik Terpadu
    </h1>
    <p class="text-gray-600 mb-8 text-lg fade-in" style="animation-delay:0.4s">
      Badan Pusat Statistik Provinsi Nusa Tenggara Barat
    </p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

      <!-- ABSENSI -->
      <div class="fade-in" style="animation-delay:0.5s">
        <a href="https://s.id/presensi_pst_5200_2026" class="block p-6 rounded-2xl shadow-md hover:shadow-xl bg-blue-50 hover:bg-blue-100 transition">
          <div class="text-4xl mb-3">📝</div>
          <h2 class="text-xl font-semibold text-blue-700">Absensi</h2>
        </a>
        <div id="qr-absensi" class="flex justify-center mt-3"></div>
      </div>

      <!-- BUKU TAMU -->
      <div class="fade-in" style="animation-delay:0.6s">
        <a href="https://bukutamu.stasntb.id/" class="block p-6 rounded-2xl shadow-md hover:shadow-xl bg-green-50 hover:bg-green-100 transition">
          <div class="text-4xl mb-3">📖</div>
          <h2 class="text-xl font-semibold text-green-700">Buku Tamu</h2>
        </a>
        <div id="qr-bukutamu" class="flex justify-center mt-3"></div>
      </div>

      <!-- PANDUAN -->
      <div class="fade-in" style="animation-delay:0.7s">
        <a href="https://s.bps.go.id/standarpstntb" class="block p-6 rounded-2xl shadow-md hover:shadow-xl bg-yellow-50 hover:bg-yellow-100 transition">
          <div class="text-4xl mb-3">📘</div>
          <h2 class="text-xl font-semibold text-yellow-700">Panduan</h2>
        </a>
        <div id="qr-panduan" class="flex justify-center mt-3"></div>
      </div>

      <!-- SKD -->
      <div class="fade-in" style="animation-delay:0.8s">
        <a href="https://skd.bps.go.id/skd/p/5200" class="block p-6 rounded-2xl shadow-md hover:shadow-xl bg-purple-50 hover:bg-purple-100 transition">
          <div class="text-4xl mb-3">📊</div>
          <h2 class="text-xl font-semibold text-purple-700">SKD</h2>
        </a>
        <div id="qr-skd" class="flex justify-center mt-3"></div>
      </div>

    </div>

    <footer class="mt-10 text-sm text-gray-400 fade-in" style="animation-delay:1s">
      © 2026 Pelayanan Statistik Terpadu <br>
	  Badan Pusat Statistik Provinsi Nusa Tenggara Barat
    </footer>

  </div>

  <!-- QR GENERATOR SCRIPT -->
  <script>
    new QRCode(document.getElementById("qr-absensi"), { text: "https://s.id/presensi_pst_5200_2026", width: 60, height: 60 });
    new QRCode(document.getElementById("qr-bukutamu"), { text: "https://bukutamu.statsntb.id/", width: 60, height: 60 });
    new QRCode(document.getElementById("qr-panduan"), { text: "https://s.bps.go.id/standarpstntb", width: 60, height: 60 });
    new QRCode(document.getElementById("qr-skd"), { text: "https://skd.bps.go.id/skd/p/5200", width: 60, height: 60 });
  </script>

</body>
</html>
